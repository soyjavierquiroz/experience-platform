version: "3.9"
services:
  web:
    image: experience-platform:live-dcd8e848
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      APP_URL: https://mnle.sayk.us
      DEFAULT_TENANT_SLUG: mnle
      TENANT_RESOLUTION_MODE: hostname
      DATABASE_URL_FILE: /run/secrets/experience_database_url_v1
      BETTER_AUTH_SECRET_FILE: /run/secrets/experience_auth_secret_v1
      EMAIL_ENABLED: "false"
      EMAIL_PROVIDER: disabled
      AUTH_EMAIL_OTP_ENABLED: "false"
      BETA_AUTO_ENROLL: "true"
      AUTH_SECURE_COOKIES: "true"
      TRUSTED_PROXY_CIDRS: 10.0.1.0/24
    secrets:
      - experience_database_url_v1
      - experience_auth_secret_v1
    networks:
      - traefik_public
      - general_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      resources:
        reservations:
          cpus: "0.15"
          memory: 192M
        limits:
          cpus: "0.75"
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
        monitor: 30s
      rollback_config:
        parallelism: 1
        delay: 5s
        order: stop-first
        monitor: 30s
      labels:
        - experience-platform.release=live-dcd8e848
        - traefik.enable=true
        - traefik.docker.network=traefik_public
        - traefik.http.routers.experience-platform.rule=Host(`mnle.sayk.us`)
        - traefik.http.routers.experience-platform.entrypoints=websecure
        - traefik.http.routers.experience-platform.tls=true
        - traefik.http.routers.experience-platform.tls.certresolver=le
        - traefik.http.services.experience-platform.loadbalancer.server.port=3000
    stop_grace_period: 30s
networks:
  traefik_public:
    external: true
  general_network:
    external: true
secrets:
  experience_database_url_v1:
    external: true
  experience_auth_secret_v1:
    external: true
